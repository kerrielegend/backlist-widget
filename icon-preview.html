const root = document.getElementById('root');

function makeCard(icon) {
  const card = document.createElement('div');
  card.className = `card ${icon.type}`;

  function circle(size, inner) {
    return `<div class="circle ${size}">${inner}</div>`;
  }

  let lgIn, smIn;
  if (icon.type === 'si') {
    const url = CDN(icon.slug);
    lgIn = `<img src="${url}" width="20" height="20" alt="${icon.label}">`;
    smIn = `<img src="${url}" width="13" height="13" alt="${icon.label}">`;
  } else if (icon.type === 'img') {
    const fs = icon.nofilter ? ' style="filter:none"' : icon.filter ? ` style="filter:${icon.filter}"` : '';
    lgIn = `<img src="${icon.src}" width="20" height="20" alt="${icon.label}"${fs}>`;
    smIn = `<img src="${icon.src}" width="13" height="13" alt="${icon.label}"${fs}>`;
  } else {
    const vb    = icon.vb || '0 0 24 24';
    const extra = icon.stroke ? ' fill="none" stroke="#aaa" stroke-width="4" stroke-linecap="round"' : '';
    lgIn = `<svg viewBox="${vb}" width="20" height="20" xmlns="http://www.w3.org/2000/svg"${extra}>${icon.svg}</svg>`;
    smIn = `<svg viewBox="${vb}" width="13" height="13" xmlns="http://www.w3.org/2000/svg"${extra}>${icon.svg}</svg>`;
  }

  const tagMap = { si:'si', brand:'si', img:'si', custom:'custom', temp:'temp' };
  const tagLabel = (icon.type === 'si' || icon.type === 'brand' || icon.type === 'img') ? 'brand' : icon.type === 'temp' ? 'placeholder' : 'custom';

  card.innerHTML = `
    <div class="sizes">
      ${circle('lg', lgIn)}
      <div class="sep"></div>
      ${circle('sm', smIn)}
    </div>
    <div class="name">${icon.label}</div>
    <div class="key">${icon.key}</div>
    <span class="tag ${tagMap[icon.type]}">${tagLabel}</span>
  `;
  return card;
}

function section(title, filter) {
  const items = ICONS.filter(filter);
  if (!items.length) return;
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="section-label">${title}</div>`;
  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(i => grid.appendChild(makeCard(i)));
  sec.appendChild(grid);
  root.appendChild(sec);
}

section('Brand icons — confirmed', i => i.type === 'si' || i.type === 'brand' || i.type === 'img');
section('Custom semantic icons (final)', i => i.type === 'custom');
section('Placeholders — drop SVG files from svgrepo.com into brand-icons/ to replace', i => i.type === 'temp');
