<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Author Backlist Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* Book card */
  .book-card { display: flex; flex-direction: column; }

  .cover-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 3;
    overflow: hidden;
    border-radius: 3px;
    box-shadow: 4px 6px 20px rgba(0,0,0,0.6);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .book-card:hover .cover-wrap {
    transform: translateY(-4px);
    box-shadow: 6px 12px 28px rgba(0,0,0,0.8);
  }
  .cover-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .cover-placeholder {
    width: 100%; height: 100%; background: #242424;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #3a3a3a; letter-spacing: 0.1em;
    text-transform: uppercase; font-family: 'Helvetica Neue', sans-serif;
  }

  /* New Release badge */
  .badge-new {
    position: absolute;
    top: 8px; right: 8px;
    background: #c8a96e;
    color: #1a1a1a;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 6px;
    border-radius: 3px;
  }

  /* Retailer icon row */
  .retailer-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
    padding: 0 2px;
  }

  .retailer-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #252525;
    border: 1px solid #333;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
    text-decoration: none;
    max-width: 40px;
    margin: 0 auto;
  }
  .retailer-btn:hover { background: #333; transform: scale(1.1); }
  .retailer-btn svg { width: 15px; height: 15px; fill: #aaa; flex-shrink: 0; }
  .retailer-btn--globe svg { fill: #777; }
  .retailer-btn--empty {
    background: transparent;
    border-color: #252525;
    cursor: default;
    pointer-events: none;
  }
  .retailer-btn--empty svg { fill: #2e2e2e; }

  @media (max-width: 600px) {
    .retailer-btn { max-width: 34px; }
    .retailer-btn svg { width: 13px; height: 13px; }
  }

  /* Lightbox shared */
  .lb-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .lb-overlay.active { display: flex; }

  .lb-panel {
    background: #222;
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    max-height: 88vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .lb-close {
    position: absolute;
    top: 16px; right: 18px;
    background: #303030;
    border: none;
    color: #888;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 1;
  }
  .lb-close:hover { background: #3c3c3c; color: #eee; }

  /* Book lightbox */
  #bookLightbox { padding: 28px 24px 40px; }

  .book-lb-inner {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .book-lb-cover {
    width: 100px;
    flex-shrink: 0;
    aspect-ratio: 2 / 3;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 4px 6px 16px rgba(0,0,0,0.5);
  }
  .book-lb-cover img { width: 100%; height: 100%; object-fit: cover; }

  .book-lb-details { flex: 1; min-width: 0; padding-top: 2px; }

  .book-lb-series {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 5px;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .book-lb-title {
    font-size: 19px;
    color: #f0ece4;
    line-height: 1.2;
    margin-bottom: 3px;
    font-style: italic;
  }
  .book-lb-author {
    font-size: 12px;
    color: #666;
    margin-bottom: 14px;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .book-lb-blurb {
    font-size: 13px;
    color: #888;
    line-height: 1.7;
    font-family: 'Helvetica Neue', sans-serif;
    margin-bottom: 20px;
  }

  .book-lb-btns {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .lb-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border-radius: 20px;
    background: #2c2c2c;
    border: 1px solid #383838;
    color: #bbb;
    font-size: 12px;
    font-family: 'Helvetica Neue', sans-serif;
    letter-spacing: 0.03em;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
    cursor: pointer;
  }
  .lb-pill:hover { background: #383838; color: #eee; }
  .lb-pill svg { width: 13px; height: 13px; fill: #888; flex-shrink: 0; }
  .lb-pill--more {
    background: #222;
    border-color: #2c2c2c;
    color: #666;
  }
  .lb-pill--more:hover { background: #2c2c2c; color: #999; }

  /* Globe / more stores lightbox */
  #globeLightbox { padding: 24px 20px 36px; }

  .globe-lb-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
    padding-right: 36px;
  }
  .globe-lb-icon {
    width: 40px; height: 40px;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .globe-lb-icon svg { width: 18px; height: 18px; fill: #777; }
  .globe-lb-book { font-size: 15px; color: #e0dcd4; font-style: italic; line-height: 1.2; margin-bottom: 3px; }
  .globe-lb-sub {
    font-size: 10px; color: #555;
    letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .globe-lb-list { display: flex; flex-direction: column; gap: 7px; }

  .globe-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    background: #272727;
    border: 1px solid #303030;
    color: #bbb;
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    text-decoration: none;
    transition: background 0.15s;
  }
  .globe-row:hover { background: #303030; color: #eee; }
  .globe-row svg { width: 16px; height: 16px; fill: #777; flex-shrink: 0; }
  .globe-row span { flex: 1; }
  .globe-row-arrow { color: #3a3a3a; font-size: 14px; }
</style>
</head>
<body>

<div class="grid" id="bookGrid"></div>

<!-- Book lightbox -->
<div class="lb-overlay" id="bookOverlay">
  <div class="lb-panel" id="bookLightbox">
    <button class="lb-close" id="bookClose">×</button>
    <div class="book-lb-inner">
      <div class="book-lb-cover"><img id="blCover" src="" alt=""></div>
      <div class="book-lb-details">
        <div class="book-lb-series" id="blSeries"></div>
        <div class="book-lb-title"  id="blTitle"></div>
        <div class="book-lb-author" id="blAuthor"></div>
        <div class="book-lb-blurb"  id="blBlurb"></div>
        <div class="book-lb-btns"   id="blBtns"></div>
      </div>
    </div>
  </div>
</div>

<!-- Globe / More Stores lightbox -->
<div class="lb-overlay" id="globeOverlay">
  <div class="lb-panel" id="globeLightbox">
    <button class="lb-close" id="globeClose">×</button>
    <div class="globe-lb-header">
      <div class="globe-lb-icon" id="globeIconWrap"></div>
      <div>
        <div class="globe-lb-book" id="globeTitle"></div>
        <div class="globe-lb-sub">More places to buy</div>
      </div>
    </div>
    <div class="globe-lb-list" id="globeList"></div>
  </div>
</div>

// ---------------------------------------------------------------------------
// Sort: series (by name → number) then standalones (by pubDate → title)
// ---------------------------------------------------------------------------
function sortBooks(list) {
  const series = list.filter(b => b.series);
  const standalones = list.filter(b => !b.series);

  series.sort((a, b) => {
    const s = a.series.localeCompare(b.series);
    if (s !== 0) return s;
    return (a.seriesNumber || 0) - (b.seriesNumber || 0);
  });

  return [...series, ...standalones];
}

// ---------------------------------------------------------------------------
// Determine which retailer keys fill slots 1–3 and which go to globe lightbox
// ---------------------------------------------------------------------------
function getSlots(book) {
  const available = PRIORITY.filter(k => book.links && book.links[k]);
  return { primary: available.slice(0, 3), overflow: available.slice(3) };
}

// ---------------------------------------------------------------------------
// Build a single book card
// ---------------------------------------------------------------------------
function buildCard(book) {
  const { primary, overflow } = getSlots(book);

  const card = document.createElement('div');
  card.className = 'book-card';

  // Cover
  const coverWrap = document.createElement('div');
  coverWrap.className = 'cover-wrap';

  if (book.cover) {
    const img = document.createElement('img');
    img.src = book.cover;
    img.alt = book.title;
    img.onerror = function () {
      this.replaceWith(makePlaceholder());
    };
    coverWrap.appendChild(img);
  } else {
    coverWrap.appendChild(makePlaceholder());
  }

  if (book.newRelease) {
    const badge = document.createElement('div');
    badge.className = 'badge-new';
    badge.textContent = 'New';
    coverWrap.appendChild(badge);
  }

  coverWrap.addEventListener('click', () => openBookLightbox(book));

  // Retailer row: 3 dynamic slots + globe
  const row = document.createElement('div');
  row.className = 'retailer-row';

  for (let i = 0; i < 3; i++) {
    const key = primary[i];
    if (key) {
      const r = RETAILERS[key];
      const a = document.createElement('a');
      a.className = 'retailer-btn';
      a.href = book.links[key];
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.title = r.label;
      a.setAttribute('aria-label', r.label);
      a.innerHTML = r.icon;
      a.addEventListener('click', e => e.stopPropagation());
      row.appendChild(a);
    } else {
      // Empty placeholder slot
      const empty = document.createElement('div');
      empty.className = 'retailer-btn retailer-btn--empty';
      empty.innerHTML = SVG('M12 12m-1 0a1 1 0 102 0 1 1 0 10-2 0'); // tiny dot
      row.appendChild(empty);
    }
  }

  // Globe slot (always visible)
  const globe = document.createElement('button');
  globe.className = 'retailer-btn retailer-btn--globe';
  globe.title = 'More stores';
  globe.setAttribute('aria-label', 'More stores');
  globe.innerHTML = ICONS.globe;
  globe.addEventListener('click', e => {
    e.stopPropagation();
    openGlobeLightbox(book, overflow);
  });
  row.appendChild(globe);

  card.appendChild(coverWrap);
  card.appendChild(row);
  return card;
}

function makePlaceholder() {
  const div = document.createElement('div');
  div.className = 'cover-placeholder';
  div.textContent = 'No Cover';
  return div;
}

// ---------------------------------------------------------------------------
// Book lightbox (cover click)
// ---------------------------------------------------------------------------
function openBookLightbox(book) {
  const { primary, overflow } = getSlots(book);

  document.getElementById('blCover').src = book.cover || '';
  document.getElementById('blCover').alt = book.title;
  document.getElementById('blSeries').textContent =
    book.series ? `${book.series}${book.seriesNumber ? ' · Book ' + book.seriesNumber : ''}` : '';
  document.getElementById('blTitle').textContent = book.title;
  document.getElementById('blAuthor').textContent = book.author || '';
  document.getElementById('blBlurb').textContent = book.blurb || '';

  const btns = document.getElementById('blBtns');
  btns.innerHTML = '';

  // Top 3 retailer pills
  primary.forEach(key => {
    const r = RETAILERS[key];
    const a = document.createElement('a');
    a.className = 'lb-pill';
    a.href = book.links[key];
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = r.icon + `<span>${r.label}</span>`;
    btns.appendChild(a);
  });

  // "+ More Stores" pill if overflow exists
  if (overflow.length > 0) {
    const more = document.createElement('button');
    more.className = 'lb-pill lb-pill--more';
    more.innerHTML = ICONS.globe + `<span>+ ${overflow.length} more store${overflow.length > 1 ? 's' : ''}</span>`;
    more.addEventListener('click', () => {
      closeBookLightbox();
      openGlobeLightbox(book, overflow);
    });
    btns.appendChild(more);
  }

  document.getElementById('bookOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeBookLightbox() {
  document.getElementById('bookOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ---------------------------------------------------------------------------
// Globe lightbox (globe icon or "+ More Stores")
// ---------------------------------------------------------------------------
function openGlobeLightbox(book, overflow) {
  document.getElementById('globeTitle').textContent = book.title;
  document.getElementById('globeIconWrap').innerHTML = ICONS.globe;

  const list = document.getElementById('globeList');
  list.innerHTML = '';

  overflow.forEach(key => {
    const r = RETAILERS[key];
    const a = document.createElement('a');
    a.className = 'globe-row';
    a.href = book.links[key];
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = r.icon + `<span>${r.label}</span><span class="globe-row-arrow">›</span>`;
    list.appendChild(a);
  });

  document.getElementById('globeOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeGlobeLightbox() {
  document.getElementById('globeOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ---------------------------------------------------------------------------
// Event wiring
// ---------------------------------------------------------------------------
document.getElementById('bookClose').addEventListener('click', closeBookLightbox);
document.getElementById('bookOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('bookOverlay')) closeBookLightbox();
});

document.getElementById('globeClose').addEventListener('click', closeGlobeLightbox);
document.getElementById('globeOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('globeOverlay')) closeGlobeLightbox();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeBookLightbox(); closeGlobeLightbox(); }
});

sortBooks(books).forEach(book => grid.appendChild(buildCard(book)));
