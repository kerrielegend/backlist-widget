<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Author Backlist Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    font-family: 'Georgia', serif;
    padding: 40px 24px;
    position: relative;
  }

  .grid {
    display: flex;
    flex-direction: row;
    gap: 16px;
    overflow-x: auto;
    padding: 8px 4px 20px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }

  .grid::-webkit-scrollbar { height: 4px; }
  .grid::-webkit-scrollbar-track { background: transparent; }
  .grid::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Book card */
  .book-card {
    display: flex;
    flex-direction: column;
    flex: 0 0 auto;
    width: 140px;
    scroll-snap-align: start;
  }

  .cover-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 3;
    overflow: hidden;
    border-radius: 3px;
    box-shadow: 4px 6px 20px rgba(0,0,0,0.6);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .book-card:hover .cover-wrap {
    transform: translateY(-4px);
    box-shadow: 6px 12px 28px rgba(0,0,0,0.8);
  }
  .cover-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .cover-placeholder {
    width: 100%; height: 100%; background: #242424;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #3a3a3a; letter-spacing: 0.1em;
    text-transform: uppercase; font-family: 'Helvetica Neue', sans-serif;
  }

  /* New Release badge */
  .badge-new {
    position: absolute;
    top: 8px; right: 8px;
    background: #c8a96e;
    color: #1a1a1a;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 6px;
    border-radius: 3px;
  }

  /* Retailer icon row */
  .retailer-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
    padding: 0 2px;
  }

  .retailer-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #252525;
    border: 1px solid #333;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
    text-decoration: none;
    max-width: 40px;
    margin: 0 auto;
  }
  .retailer-btn:hover { background: #333; transform: scale(1.1); }
  .retailer-btn svg { width: 15px; height: 15px; fill: #aaa; flex-shrink: 0; }
  .retailer-btn img { width: 15px; height: 15px; flex-shrink: 0; display: block; filter: invert(67%); }
  .retailer-btn--globe svg { fill: #aaa; }
  .retailer-btn--empty {
    background: transparent;
    border-color: #252525;
    cursor: default;
    pointer-events: none;
  }
  .retailer-btn--empty svg { fill: #2e2e2e; }

  @media (max-width: 600px) {
    .retailer-btn { max-width: 34px; }
    .retailer-btn svg { width: 13px; height: 13px; }
    .retailer-btn img { width: 13px; height: 13px; }
  }

  /* ── Light / transparent theme ──────────────────────────────────────── */
  body.theme-light { background: transparent; }
  body.theme-light .cover-wrap {
    box-shadow: 4px 6px 16px rgba(0,0,0,0.22);
  }
  body.theme-light .book-card:hover .cover-wrap {
    box-shadow: 6px 10px 22px rgba(0,0,0,0.32);
  }
  body.theme-light .retailer-btn {
    background: rgba(0,0,0,0.07);
    border-color: rgba(0,0,0,0.14);
  }
  body.theme-light .retailer-btn:hover { background: rgba(0,0,0,0.13); }
  body.theme-light .retailer-btn svg { fill: #444; }
  body.theme-light .retailer-btn img { filter: grayscale(1) brightness(0.3) !important; }
  body.theme-light .retailer-btn--empty { background: transparent; border-color: rgba(0,0,0,0.06); }
  body.theme-light .retailer-btn--empty svg { fill: rgba(0,0,0,0.08); }
  body.theme-light .grid::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); }

  /* Lightbox shared */
  .lb-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .lb-overlay.active { display: flex; }

  .lb-panel {
    background: #222;
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 740px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .lb-close {
    position: absolute;
    top: 16px; right: 18px;
    background: #303030;
    border: none;
    color: #888;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 1;
  }
  .lb-close:hover { background: #3c3c3c; color: #eee; }

  /* Book lightbox */
  #bookLightbox { padding: 28px 28px 36px; }

  .book-lb-inner {
    display: grid;
    grid-template-columns: 90px 1fr 172px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 600px) {
    .book-lb-inner { grid-template-columns: 70px 1fr; }
    .book-lb-buy { grid-column: 1 / -1; flex-direction: row !important; flex-wrap: wrap; }
  }

  .book-lb-cover {
    width: 100%;
    aspect-ratio: 2 / 3;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 4px 6px 16px rgba(0,0,0,0.5);
  }
  .book-lb-cover img { width: 100%; height: 100%; object-fit: cover; }

  .book-lb-details { flex: 1; min-width: 0; padding-top: 2px; }

  .book-lb-series {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 5px;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .book-lb-title {
    font-size: 19px;
    color: #f0ece4;
    line-height: 1.2;
    margin-bottom: 3px;
    font-style: italic;
  }
  .book-lb-author {
    font-size: 12px;
    color: #666;
    margin-bottom: 14px;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .book-lb-blurb {
    font-size: 13px;
    color: #888;
    line-height: 1.7;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .book-lb-buy {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .lb-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 11px;
    border-radius: 8px;
    background: #2c2c2c;
    border: 1px solid #383838;
    color: #bbb;
    font-size: 12px;
    font-family: 'Helvetica Neue', sans-serif;
    letter-spacing: 0.02em;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
    cursor: pointer;
  }
  .lb-pill:hover { background: #343434; color: #eee; }
  .lb-pill svg { width: 13px; height: 13px; fill: #888; flex-shrink: 0; }
  .lb-pill img { width: 13px; height: 13px; flex-shrink: 0; }

  /* Globe / more stores lightbox */
  #globeLightbox { padding: 24px 20px 36px; }

  .globe-lb-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
    padding-right: 36px;
  }
  .globe-lb-icon {
    width: 48px;
    flex-shrink: 0;
    aspect-ratio: 2 / 3;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 2px 4px 10px rgba(0,0,0,0.5);
    background: #2a2a2a;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .globe-lb-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .globe-lb-icon svg { width: 18px; height: 18px; fill: #aaa; }
  .globe-lb-book { font-size: 15px; color: #e0dcd4; font-style: italic; line-height: 1.2; margin-bottom: 3px; }
  .globe-lb-sub {
    font-size: 10px; color: #555;
    letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .globe-lb-list { display: flex; flex-direction: column; gap: 7px; }

  .globe-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    background: #272727;
    border: 1px solid #303030;
    color: #bbb;
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    text-decoration: none;
    transition: background 0.15s;
  }
  .globe-row:hover { background: #303030; color: #eee; }
  .globe-row svg { width: 16px; height: 16px; fill: #777; flex-shrink: 0; }
  .globe-row span { flex: 1; }
  .globe-row-arrow { color: #3a3a3a; font-size: 14px; }
</style>
</head>
<body>

<div class="grid" id="bookGrid"></div>

<!-- Book lightbox -->
<div class="lb-overlay" id="bookOverlay">
  <div class="lb-panel" id="bookLightbox">
    <button class="lb-close" id="bookClose">×</button>
    <div class="book-lb-inner">
      <div class="book-lb-cover"><img id="blCover" src="" alt=""></div>
      <div class="book-lb-details">
        <div class="book-lb-series" id="blSeries"></div>
        <div class="book-lb-title"  id="blTitle"></div>
        <div class="book-lb-author" id="blAuthor"></div>
        <div class="book-lb-blurb"  id="blBlurb"></div>
      </div>
      <div class="book-lb-buy" id="blBtns"></div>
    </div>
  </div>
</div>

<!-- Globe / More Stores lightbox -->
<div class="lb-overlay" id="globeOverlay">
  <div class="lb-panel" id="globeLightbox">
    <button class="lb-close" id="globeClose">×</button>
    <div class="globe-lb-header">
      <div class="globe-lb-icon" id="globeIconWrap"></div>
      <div>
        <div class="globe-lb-book" id="globeTitle"></div>
        <div class="globe-lb-sub">More places to buy</div>
      </div>
    </div>
    <div class="globe-lb-list" id="globeList"></div>
  </div>
</div>

// ---------------------------------------------------------------------------
// Sort: series (by name → number) then standalones (by pubDate → title)
// ---------------------------------------------------------------------------
function sortBooks(list) {
  const series = list.filter(b => b.series);
  const standalones = list.filter(b => !b.series);

  series.sort((a, b) => {
    const s = a.series.localeCompare(b.series);
    if (s !== 0) return s;
    return (a.seriesNumber || 0) - (b.seriesNumber || 0);
  });

  return [...series, ...standalones];
}

// ---------------------------------------------------------------------------
// Determine which retailer keys fill slots 1–3 and which go to globe lightbox
// ---------------------------------------------------------------------------
function getSlots(book) {
  const available = PRIORITY.filter(k => book.links && book.links[k]);
  return { primary: available.slice(0, 3), overflow: available.slice(3) };
}

// ---------------------------------------------------------------------------
// Build a single book card
// ---------------------------------------------------------------------------
function buildCard(book) {
  const { primary, overflow } = getSlots(book);

  const card = document.createElement('div');
  card.className = 'book-card';

  // Cover
  const coverWrap = document.createElement('div');
  coverWrap.className = 'cover-wrap';

  if (book.cover) {
    const img = document.createElement('img');
    img.src = book.cover;
    img.alt = book.title;
    img.onerror = function () {
      this.replaceWith(makePlaceholder());
    };
    coverWrap.appendChild(img);
  } else {
    coverWrap.appendChild(makePlaceholder());
  }

  if (book.newRelease) {
    const badge = document.createElement('div');
    badge.className = 'badge-new';
    badge.textContent = 'New';
    coverWrap.appendChild(badge);
  }

  coverWrap.addEventListener('click', () => openBookLightbox(book));

  // Retailer row: 3 dynamic slots + globe
  const row = document.createElement('div');
  row.className = 'retailer-row';

  for (let i = 0; i < 3; i++) {
    const key = primary[i];
    if (key) {
      const r = RETAILERS[key];
      const a = document.createElement('a');
      a.className = 'retailer-btn';
      a.href = book.links[key];
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.title = r.label;
      a.setAttribute('aria-label', r.label);
      a.innerHTML = r.icon;
      a.addEventListener('click', e => e.stopPropagation());
      row.appendChild(a);
    } else {
      // Empty placeholder slot
      const empty = document.createElement('div');
      empty.className = 'retailer-btn retailer-btn--empty';
      empty.innerHTML = SVG('M12 12m-1 0a1 1 0 102 0 1 1 0 10-2 0'); // tiny dot
      row.appendChild(empty);
    }
  }

  // Globe slot (always visible)
  const globe = document.createElement('button');
  globe.className = 'retailer-btn retailer-btn--globe';
  globe.title = 'More stores';
  globe.setAttribute('aria-label', 'More stores');
  globe.innerHTML = ICONS.globe;
  globe.addEventListener('click', e => {
    e.stopPropagation();
    openGlobeLightbox(book, overflow);
  });
  row.appendChild(globe);

  card.appendChild(coverWrap);
  card.appendChild(row);
  return card;
}

function makePlaceholder() {
  const div = document.createElement('div');
  div.className = 'cover-placeholder';
  div.textContent = 'No Cover';
  return div;
}

// ---------------------------------------------------------------------------
// Book lightbox (cover click)
// ---------------------------------------------------------------------------
function openBookLightbox(book) {
  const { primary, overflow } = getSlots(book);

  const blCoverWrap = document.getElementById('blCover').parentElement;
  if (book.cover) {
    document.getElementById('blCover').src = book.cover;
    document.getElementById('blCover').alt = book.title;
    blCoverWrap.style.display = '';
  } else {
    blCoverWrap.style.display = 'none';
  }
  document.getElementById('blSeries').textContent =
    book.series ? `${book.series}${book.seriesNumber ? ' · Book ' + book.seriesNumber : ''}` : '';
  document.getElementById('blTitle').textContent = book.title;
  document.getElementById('blAuthor').textContent = book.author || '';
  document.getElementById('blBlurb').textContent = book.blurb || '';

  const btns = document.getElementById('blBtns');
  btns.innerHTML = '';

  // All available retailers in priority order
  [...primary, ...overflow].forEach(key => {
    const r = RETAILERS[key];
    const a = document.createElement('a');
    a.className = 'lb-pill';
    a.href = book.links[key];
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = r.icon + `<span>${r.label}</span>`;
    btns.appendChild(a);
  });

  document.getElementById('bookOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeBookLightbox() {
  document.getElementById('bookOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ---------------------------------------------------------------------------
// Globe lightbox (globe icon or "+ More Stores")
// ---------------------------------------------------------------------------
function openGlobeLightbox(book, overflow) {
  document.getElementById('globeTitle').textContent = book.title;
  const globeIconWrap = document.getElementById('globeIconWrap');
  if (book.cover) {
    globeIconWrap.innerHTML = `<img src="${book.cover}" alt="${book.title}">`;
  } else {
    globeIconWrap.innerHTML = ICONS.globe;
  }

  const list = document.getElementById('globeList');
  list.innerHTML = '';

  overflow.forEach(key => {
    const r = RETAILERS[key];
    const a = document.createElement('a');
    a.className = 'globe-row';
    a.href = book.links[key];
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = r.icon + `<span>${r.label}</span><span class="globe-row-arrow">›</span>`;
    list.appendChild(a);
  });

  document.getElementById('globeOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeGlobeLightbox() {
  document.getElementById('globeOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ---------------------------------------------------------------------------
// Event wiring
// ---------------------------------------------------------------------------
document.getElementById('bookClose').addEventListener('click', closeBookLightbox);
document.getElementById('bookOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('bookOverlay')) closeBookLightbox();
});

document.getElementById('globeClose').addEventListener('click', closeGlobeLightbox);
document.getElementById('globeOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('globeOverlay')) closeGlobeLightbox();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeBookLightbox(); closeGlobeLightbox(); }
});

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
function render(list) {
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = '';
  sortBooks(list).forEach(book => grid.appendChild(buildCard(book)));
}

// ---------------------------------------------------------------------------
// Init — fetch live data when ?token= is present, else use inline sample data
// ---------------------------------------------------------------------------
(async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (params.get('theme') === 'light') document.body.classList.add('theme-light');
  if (!token) { render(books); return; }

  try {
    const res = await fetch(`/api/books?token=${encodeURIComponent(token)}`);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const { books: live } = await res.json();
    render(live);
  } catch (err) {
    console.warn('Widget: API fetch failed, using sample data.', err);
    render(books);
  }
})();
</script>
